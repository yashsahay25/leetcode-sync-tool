name: Sync LeetCode submissions

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 12:30 AM IST.
    - cron: "0 19 * * *"

permissions:
  contents: read

concurrency:
  group: leetcode-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sync tool
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: sync-tool

      - name: Checkout submissions archive
        uses: actions/checkout@v4
        with:
          repository: yashsahay25/leetcode-submissions-archive
          token: ${{ secrets.ARCHIVE_REPO_TOKEN }}
          fetch-depth: 0
          path: archive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: sync-tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure archive Git author
        working-directory: archive
        run: |
          git config user.name "leetcode-sync-tool[bot]"
          git config user.email "leetcode-sync-tool[bot]@users.noreply.github.com"

      - name: Sync accepted submissions into archive
        working-directory: archive
        env:
          PYTHONPATH: ${{ github.workspace }}/sync-tool
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}
        run: python -m archiver.main

      - name: Push archive commits
        working-directory: archive
        run: git push
