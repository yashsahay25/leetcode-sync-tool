name: Sync LeetCode submissions

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 12:30 AM IST.
    - cron: "0 19 * * *"

permissions:
  contents: write

concurrency:
  group: leetcode-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure Git author
        run: |
          git config user.name "leetcode-archiver[bot]"
          git config user.email "leetcode-archiver[bot]@users.noreply.github.com"

      - name: Sync accepted submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}
        run: python -m archiver.main

      - name: Push archive commits
        run: git push
